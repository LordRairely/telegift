services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegift}
      POSTGRES_USER: ${POSTGRES_USER:-telegift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telegift}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-telegift}:${POSTGRES_PASSWORD:-telegift}@db:5432/${POSTGRES_DB:-telegift}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  bot:
    build: .
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-telegift}:${POSTGRES_PASSWORD:-telegift}@db:5432/${POSTGRES_DB:-telegift}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
