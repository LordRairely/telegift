<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">GiftSensor: текущие процессы после обновления 152-ФЗ</title>
  <desc id="desc">Схема Telegram-бота: согласие пользователя, ссылка на политику, загрузка файла, временное хранение, анонимизация, YandexGPT, Q&amp;A, feedback, PostgreSQL и Alembic-миграции.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #152033; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #526070; }
      .lane { fill: #ffffff; stroke: #d7dde6; stroke-width: 1.5; rx: 8; }
      .box { fill: #ffffff; stroke: #253142; stroke-width: 2; rx: 8; }
      .blue { fill: #eaf4ff; stroke: #2364aa; }
      .green { fill: #ecf7ef; stroke: #24824d; }
      .amber { fill: #fff4df; stroke: #b36b00; }
      .red { fill: #fff0f0; stroke: #b33a3a; }
      .gray { fill: #f4f6f8; stroke: #657181; }
      .purple { fill: #f2efff; stroke: #6750a4; }
      .label { font: 700 18px Arial, sans-serif; fill: #152033; }
      .text { font: 400 14px Arial, sans-serif; fill: #253142; }
      .small { font: 400 12px Arial, sans-serif; fill: #526070; }
      .note { font: 700 13px Arial, sans-serif; fill: #9b1c1c; }
      .ok { font: 700 13px Arial, sans-serif; fill: #18623a; }
      .laneTitle { font: 700 13px Arial, sans-serif; fill: #526070; letter-spacing: 0; }
      .pill { fill: #253142; rx: 12; }
      .pillText { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #253142; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead); }
      .soft { stroke: #657181; stroke-width: 2; fill: none; marker-end: url(#arrowheadSoft); stroke-dasharray: 6 5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#253142" />
    </marker>
    <marker id="arrowheadSoft" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#657181" />
    </marker>
  </defs>

  <rect class="bg" width="1440" height="980"/>

  <text x="64" y="62" class="title">GiftSensor: процессы после обновления 152-ФЗ</text>
  <text x="64" y="92" class="subtitle">Добавлены явное согласие, ссылка на политику, хранение факта согласия, усиленная анонимизация и миграция БД.</text>

  <rect x="48" y="122" width="1344" height="202" class="lane"/>
  <text x="64" y="146" class="laneTitle">1. Вход пользователя и юридический контур</text>

  <rect x="72" y="170" width="218" height="118" class="box blue"/>
  <text x="96" y="202" class="label">Пользователь</text>
  <text x="96" y="230" class="text">Открывает /start</text>
  <text x="96" y="252" class="text">Получает условия</text>
  <text x="96" y="274" class="text">Нажимает «Начать»</text>

  <rect x="348" y="160" width="258" height="138" class="box amber"/>
  <text x="372" y="192" class="label">Consent gate</text>
  <text x="372" y="220" class="text">handlers/base.py</text>
  <text x="372" y="242" class="text">Кнопка «Начать»</text>
  <text x="372" y="264" class="text">Без согласия файл не принят</text>
  <text x="372" y="286" class="ok">До согласия нет записи в БД</text>

  <rect x="664" y="160" width="258" height="138" class="box purple"/>
  <text x="688" y="192" class="label">Политика ПД</text>
  <text x="688" y="220" class="text">PRIVACY_POLICY_URL</text>
  <text x="688" y="242" class="text">Кнопка-ссылка в /start</text>
  <text x="688" y="264" class="text">bot.set_my_description()</text>
  <text x="688" y="286" class="small">Google Docs с политикой</text>

  <rect x="980" y="160" width="286" height="138" class="box gray"/>
  <text x="1004" y="192" class="label">PostgreSQL: telegram_users</text>
  <text x="1004" y="220" class="text">telegram_id, username, names</text>
  <text x="1004" y="242" class="text">referral/acquisition source</text>
  <text x="1004" y="264" class="text">terms_accepted_at</text>
  <text x="1004" y="286" class="small">факт и время согласия</text>

  <path d="M290 229 H348" class="arrow"/>
  <path d="M606 229 H664" class="arrow"/>
  <path d="M922 229 H980" class="arrow"/>

  <rect x="48" y="354" width="1344" height="260" class="lane"/>
  <text x="64" y="378" class="laneTitle">2. Анализ переписки и zero-persistence</text>

  <rect x="72" y="410" width="218" height="154" class="box blue"/>
  <text x="96" y="442" class="label">Файл чата</text>
  <text x="96" y="470" class="text">JSON или TXT</text>
  <text x="96" y="492" class="text">Проверка расширения</text>
  <text x="96" y="514" class="text">Проверка размера</text>
  <text x="96" y="536" class="small">после принятия условий</text>

  <rect x="348" y="410" width="258" height="154" class="box amber"/>
  <text x="372" y="442" class="label">FSM-сценарий</text>
  <text x="372" y="470" class="text">waiting_for_context</text>
  <text x="372" y="492" class="text">Хранит file_id</text>
  <text x="372" y="514" class="text">5 вопросов о подарке</text>
  <text x="372" y="536" class="small">контекст тоже анонимизируется</text>

  <rect x="664" y="410" width="258" height="154" class="box red"/>
  <text x="688" y="442" class="label">Временный файл</text>
  <text x="688" y="470" class="text">tempfile.NamedTemporaryFile</text>
  <text x="688" y="492" class="text">download_file() внутри try</text>
  <text x="688" y="514" class="note">os.remove() в finally</text>
  <text x="688" y="536" class="small">исходный файл не пишется в БД</text>

  <rect x="980" y="400" width="286" height="174" class="box green"/>
  <text x="1004" y="432" class="label">Parser + anonymizer</text>
  <text x="1004" y="460" class="text">parse_telegram_json()/txt()</text>
  <text x="1004" y="482" class="text">Роли участников</text>
  <text x="1004" y="504" class="text">[PHONE_HIDDEN], [EMAIL_HIDDEN]</text>
  <text x="1004" y="526" class="text">[ADDRESS_HIDDEN], документы</text>
  <text x="1004" y="548" class="small">anonymize_free_text() для контекста</text>

  <path d="M290 487 H348" class="arrow"/>
  <path d="M606 487 H664" class="arrow"/>
  <path d="M922 487 H980" class="arrow"/>
  <path d="M477 298 C477 350 477 364 477 410" class="soft"/>

  <rect x="48" y="644" width="1344" height="214" class="lane"/>
  <text x="64" y="668" class="laneTitle">3. Внешний AI-анализ, ответы и аналитика</text>

  <rect x="72" y="700" width="270" height="118" class="box green"/>
  <text x="96" y="732" class="label">Анонимизированный ввод</text>
  <text x="96" y="760" class="text">Диалог до 10000 символов</text>
  <text x="96" y="782" class="text">Контекст подарка очищен</text>
  <text x="96" y="804" class="text">Q&amp;A-вопрос очищен</text>

  <rect x="400" y="690" width="286" height="138" class="box blue"/>
  <text x="424" y="722" class="label">YandexGPT</text>
  <text x="424" y="750" class="text">generate_gift_ideas()</text>
  <text x="424" y="772" class="text">answer_dialog_question()</text>
  <text x="424" y="794" class="text">x-data-logging-enabled: false</text>
  <text x="424" y="816" class="small">timeout + retries</text>

  <rect x="744" y="690" width="250" height="138" class="box"/>
  <text x="768" y="722" class="label">Ответы бота</text>
  <text x="768" y="750" class="text">3-5 идей подарков</text>
  <text x="768" y="772" class="text">Сценарии и бюджеты</text>
  <text x="768" y="794" class="text">Q&amp;A строго по чату</text>
  <text x="768" y="816" class="small">без восстановления имен</text>

  <rect x="1052" y="690" width="286" height="138" class="box gray"/>
  <text x="1076" y="722" class="label">Аналитика в PostgreSQL</text>
  <text x="1076" y="750" class="text">gift_analyses: status/error</text>
  <text x="1076" y="772" class="text">file_format, file_size_bytes</text>
  <text x="1076" y="794" class="text">gift_feedback: rating/comment</text>
  <text x="1076" y="816" class="small">сырой чат и файл не сохраняются</text>

  <path d="M342 759 H400" class="arrow"/>
  <path d="M686 759 H744" class="arrow"/>
  <path d="M994 759 H1052" class="soft"/>
  <path d="M1123 574 V628 H56 V759 H72" class="arrow"/>

  <rect x="48" y="888" width="1344" height="64" class="lane"/>
  <text x="64" y="912" class="laneTitle">4. Эксплуатационные процессы</text>
  <text x="84" y="936" class="text">Docker Compose передаёт PRIVACY_POLICY_URL в bot-контейнер; сервис migrate выполняет Alembic upgrade head перед запуском bot.</text>
  <rect x="1116" y="903" width="210" height="26" class="pill"/>
  <text x="1132" y="921" class="pillText">202605100001: terms acceptance</text>

  <path d="M1195 828 C1195 858 1195 872 1195 888" class="soft"/>
</svg>
